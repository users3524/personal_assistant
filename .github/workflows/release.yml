# =====================================
# 个人全能助手 — APK 自动构建 & Release
# =====================================
# 在 GitHub 上打 tag 推送后自动触发：
#   git tag v1.0.0
#   git push origin v1.0.0
# =====================================

name: 构建 APK 并发布 Release

on:
  push:
    tags:
      - 'v*'               # v1.0.0 / v1.0.1 / v2.0.0-beta 等

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest
    # 国内网络慢时可改用: runs-on: ubuntu-24.04-arm (实测 GitHub Actions 国内下载 Flutter 约 2-3 分钟)

    steps:
      # 1. 拉取代码（含完整 git 历史，用于生成 changelog）
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Java 17（与本地开发环境保持一致）
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 设置 Flutter
      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      # 4. 获取依赖
      - name: 安装依赖
        run: flutter pub get

      # 5. 运行 drift 代码生成
      - name: 生成代码
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. 构建 debug APK
      #    后续如需 release 签名，在 secrets 里配 KEY_STORE_* 并加 signingConfigs
      - name: 构建 APK
        run: flutter build apk --debug

      # 7. 生成 Release 日志
      - name: 生成变更日志
        id: changelog
        run: |
          # 获取上一个 tag，如果没有则从第一个 commit 开始
          PREV_TAG=$(git describe --tags --abbrev=0 @^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # 没有上一个 tag → 取所有中文 commit
            git log --oneline --no-decorate --format="%s" > release_notes.txt
          else
            # 有上一个 tag → 取该 tag 到现在的 commit
            echo "## 自 $PREV_TAG 以来的变更" > release_notes.txt
            echo "" >> release_notes.txt
            git log $PREV_TAG..@ --oneline --no-decorate --format="- %s" | while IFS= read -r line; do
              # 去掉英文前缀，只保留中文描述
              clean_line=$(echo "$line" | sed 's/- fix: /- 修复: /;s/- feat: /- 新增: /;s/- chore: /- 杂项: /;s/- docs: /- 文档: /;s/- refactor: /- 重构: /;s/- build: /- 构建: /')
              echo "$clean_line" >> release_notes.txt
            done
          fi
          echo "变更日志内容:"
          cat release_notes.txt

      # 8. 确认 APK 文件存在
      - name: 确认 APK
        run: |
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo "APK_SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-debug.apk)" >> $GITHUB_OUTPUT
        id: apk_info

      # 9. 创建 GitHub Release 并上传 APK
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          # Release 标题 = 标签名 + 日期
          name: 📱 个人全能助手 ${{ github.ref_name }}
          # Release 正文 = 生成的变更日志
          body_path: release_notes.txt
          # 上传的文件
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
          # 是否标记为预发布（包含 beta/alpha/rc 标记时自动预发布）
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          # 自动生成 release 备注（作为 body 的补充）
          generate_release_notes: false
