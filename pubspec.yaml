name: personal_assistant
description: 个人全能助手 - 待办/文玩/AI复盘/动态简历
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.0

# Android 16 (API 36) 目标配置
# 需要在 Android Studio 中安装以下 SDK：
# - Android SDK Platform 36
# - Android SDK Build-Tools 36

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.0

  # 数据库
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # 网络（AI API）
  dio: ^5.4.3+1

  # 图表
  fl_chart: ^0.68.0

  # 通知
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2

  # 图片
  image_picker: ^1.0.7
  gal: ^2.3.0

  # 分享
  share_plus: ^12.0.2

  # 国际化
  flutter_localizations:
    sdk: flutter

  # 语音输入
  speech_to_text: ^7.0.0

  # 文件选择
  file_picker: ^8.0.3

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
