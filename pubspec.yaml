name: personal_assistant
description: 个人全能助手 - 待办/文玩/AI复盘/动态简历
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

# Android 16 (API 36) 目标配置
# 需要在 Android Studio 中安装以下 SDK：
# - Android SDK Platform 36
# - Android SDK Build-Tools 36

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 数据库
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # 网络
  dio: ^5.4.3+1

  # AI
  # 使用 dio 直接调用 OpenAI 兼容 API

  # 图表
  fl_chart: ^0.68.0

  # PDF
  pdf: ^3.11.0
  printing: ^5.12.0

  # 通知
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2

  # 图片
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 分享
  share_plus: ^9.0.0

  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.7.4

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: any

  # 工具
  device_info_plus: ^10.1.0
  file_picker: ^8.0.3
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
